<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
    <title>Frontend Mentor | NFT preview card component</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-[hsl(217_54%_11%)] font-[Outfit]">

    <main class="w-48 md:w-64 lg:w-80 bg-[hsl(216_50%_16%)] rounded-xl ">
        
        <div class="p-6" >
            
            <div class="cursor-pointer relative group">
                
                <img class=" rounded-xl hover:text-[hsl(178_100%_50%)] " src="./images/image-equilibrium.jpg"></img>
                 
                <div class="absolute inset-0 bg-cyan-400/60 opacity-0 group-hover:opacity-100 rounded-xl z-10">

                </div>
                
                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 z-20">
                    
                    <img src="./images/icon-view.svg" class="w-10 h-10">
                
                </div>

            </div>
            
            <div>
                
                <h1 class="py-4 text-white text-base text-xs md:text-sm lg:text-xl hover:text-[hsl(178_100%_50%)] cursor-pointer">Equilibrium #3429</h1>
                <p class="text-[hsl(215_51%_70%)] text-[10px] md:text-sm lg:text-base">Our Equilibrium collection promotes balance and calm.</p>
    
            </div>
            
            <div class="flex py-2 ">
                
                <div class="flex w-full justify-start items-center">
                    
                    <img class="h-[1rem] pr-2" src="./images/icon-ethereum.svg">
                    <p class="text-[hsl(178_100%_50%)] text-[8px] md:text-sm lg:text-base">0.041 ETH</p>
                
                </div>

                <div class="flex w-full justify-end items-center">
                    
                    <img class="h-[1rem] pr-2 " src="./images/icon-clock.svg">
                    <p class="text-[hsl(215_51%_70%)] text-[8px] md:text-sm lg:text-base">3 days left</p>
                
                </div>
                
            </div>
            
            <hr class="border-t border-[hsl(215_32%_27%)] my-2">

            <div class="flex">
                <div class=""></div>
                <img class="w-4 h-4 md:w-8 md:h-8 rounded-full border-2 border-white " src="./images/image-avatar.png"></img>
                
                <div class="flex my-auto pl-3">
                    
                    <p class="text-[hsl(215_51%_70%)] pr-1 text-[8px] md:text-sm lg:text-base">
                        Creation of <p class="text-white hover:text-[hsl(178_100%_50%)] cursor-pointer text-[8px] md:text-sm lg:text-base"> Jules Wyvern</p>
                    </p>
    
                </div>
    
            </div>
            
        </div>

    </main>
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="https://github.com/donSebamarquez">Sebastián Márquez</a>.
    </footer>
  


</body>
</html>
